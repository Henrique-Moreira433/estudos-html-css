<head>

<body>
    <style>
    #nome, #label-nome {

        display: block;

    <form action="#" method="get" 
    target="_blank" autocomplete="off">
        <p>O meu Formulário</p>
        <p>
           <label for="nome" id="label-nome">Nome:</label>
          <input type="text" id="nome" name="nome"

         <p>

        </p>

        <p>
           <label >Gênero:</label>
